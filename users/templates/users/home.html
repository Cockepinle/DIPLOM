<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Корпоративное обучение</title>
    <script>
        (function () {
            const stored = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', stored);
        })();
    </script>
    <style>
        @font-face {
            font-family: "AppFont";
            src: url("/static/fonts/DejaVuSans.ttf") format("truetype");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: "AppFont";
            src: url("/static/fonts/DejaVuSans-Bold.ttf") format("truetype");
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
        :root {
            --font: "AppFont", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
            --bg:
                radial-gradient(1200px 720px at 20% 0%, rgba(157, 255, 43, 0.10), transparent 60%),
                radial-gradient(900px 520px at 92% 18%, rgba(255, 255, 255, 0.06), transparent 62%),
                linear-gradient(165deg, #07090d, #0b1016 55%, #0a0f14);
            --text: rgba(241, 245, 255, 0.94);
            --muted: rgba(215, 222, 240, 0.62);
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.10);
            --btn-bg: linear-gradient(135deg, #c7ff66, #9dff2b);
            --btn-text: #15171c;
            --shadow-card:
                0 22px 70px rgba(0, 0, 0, 0.55),
                0 1px 0 rgba(255, 255, 255, 0.06) inset;
        }
        :root[data-theme="light"] {
            --bg:
                radial-gradient(1200px 720px at 18% 0%, rgba(255, 255, 255, 0.92), transparent 62%),
                radial-gradient(900px 520px at 92% 18%, rgba(255, 255, 255, 0.75), transparent 60%),
                linear-gradient(165deg, #f1f2f6, #e9ebf1 55%, #e3e6ee);
            --text: #15171c;
            --muted: rgba(34, 39, 49, 0.68);
            --card-bg: rgba(255, 255, 255, 0.72);
	            --card-border: rgba(16, 24, 40, 0.16);
            --btn-bg: linear-gradient(135deg, #c7ff66, #9dff2b);
            --btn-text: #15171c;
            --shadow-card: 0 22px 70px rgba(16, 24, 40, 0.12);
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .home-card {
            width: min(520px, 95vw);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-card);
        }
        .home-card p {
            color: var(--muted);
        }
        .home-actions {
            display: grid;
            gap: 10px;
            margin-top: 18px;
        }
        .home-actions a {
            display: inline-flex;
            justify-content: center;
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--btn-bg);
            color: var(--btn-text);
            text-decoration: none;
            font-weight: 600;
        }
        .home-actions a.secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--card-border);
        }
        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 32px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            width: auto;
        }
        .theme-toggle .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--btn-bg);
        }
    </style>
</head>
<body>
    <button type="button" class="theme-toggle" id="themeToggle">Тема</button>
    <div class="home-card">
        <h1>Система обучения и оценки сотрудников</h1>
        <p>Добро пожаловать в корпоративную систему обучения ООО «Арт Кулинария»</p>
        <div class="home-actions">
            <a href="{% url 'login' %}">Войти</a>
            <a href="{% url 'register' %}">Регистрация (заявка)</a>
            <a class="secondary" href="{% url 'password_reset' %}">Забыли пароль?</a>
        </div>
    </div>
    <script>
        (function () {
            const root = document.documentElement;
            const btn = document.getElementById('themeToggle');
            function applyTheme(theme) {
                root.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                btn.innerHTML = `<span class="dot"></span><span class="label">${theme === 'light' ? 'Светлая' : 'Темная'}</span>`;
                btn.title = 'Сменить тему';
            }
            const current = localStorage.getItem('theme') || 'dark';
            applyTheme(current);
            btn.addEventListener('click', () => {
                const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                applyTheme(next);
            });
        })();
    </script>
</body>
</html>
