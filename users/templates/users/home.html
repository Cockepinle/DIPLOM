<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Корпоративное обучение</title>
    <script>
        (function () {
            const stored = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', stored);
        })();
    </script>
    <style>
        :root {
            --bg: linear-gradient(135deg, #2b1055, #7597de);
            --text: #fff;
            --muted: #e7e7ff;
            --card-bg: rgba(255, 255, 255, 0.15);
            --card-border: rgba(255, 255, 255, 0.2);
            --btn-bg: linear-gradient(135deg, #6a11cb, #2575fc);
            --btn-text: #fff;
        }
        :root[data-theme="light"] {
            --bg: #f7f7fb;
            --text: #111;
            --muted: #5a5a68;
            --card-bg: #ffffff;
            --card-border: rgba(0, 0, 0, 0.12);
            --btn-bg: #111;
            --btn-text: #fff;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .home-card {
            width: min(520px, 95vw);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .home-card p {
            color: var(--muted);
        }
        .home-actions {
            display: grid;
            gap: 10px;
            margin-top: 18px;
        }
        .home-actions a {
            display: inline-flex;
            justify-content: center;
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--btn-bg);
            color: var(--btn-text);
            text-decoration: none;
            font-weight: 600;
        }
        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 32px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            width: auto;
        }
        .theme-toggle .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--btn-bg);
        }
    </style>
</head>
<body>
    <button type="button" class="theme-toggle" id="themeToggle">Тема</button>
    <div class="home-card">
        <h1>Система обучения и оценки сотрудников</h1>
        <p>Добро пожаловать в корпоративную систему обучения ООО «Арт Кулинария»</p>
        <div class="home-actions">
            <a href="{% url 'login' %}">Войти</a>
            <a href="#">Регистрация (через администратора)</a>
        </div>
    </div>
    <script>
        (function () {
            const root = document.documentElement;
            const btn = document.getElementById('themeToggle');
            function applyTheme(theme) {
                root.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                btn.innerHTML = `<span class="dot"></span><span class="label">${theme === 'light' ? 'Светлая' : 'Темная'}</span>`;
                btn.title = 'Сменить тему';
            }
            const current = localStorage.getItem('theme') || 'dark';
            applyTheme(current);
            btn.addEventListener('click', () => {
                const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                applyTheme(next);
            });
        })();
    </script>
</body>
</html>
