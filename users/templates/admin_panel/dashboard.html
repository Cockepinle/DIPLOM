{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>
    <link rel="stylesheet" href="{% static 'admin_panel/admin_panel.css' %}?v=9">
    <script>
        (function () {
            const stored = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', stored);
        })();
    </script>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">Админ‑панель</div>
            <div class="subtitle">Управление всеми сущностями через API</div>
            <input class="nav-search" id="navSearch" placeholder="Поиск раздела…" autocomplete="off">
            <div class="nav" id="resourceList"></div>
            <div class="sidebar-footer">
                <div class="small">Только администратор.</div>
                <a class="sidebar-link" href="{% url 'home' %}" title="На главную страницу">На главную</a>
                <a class="sidebar-link" href="{% url 'chat_inbox' %}" title="Чаты сотрудников">Чаты</a>
                <form method="post" action="{% url 'logout' %}" id="logoutForm">
                    {% csrf_token %}
                    <button class="sidebar-link sidebar-link--danger" type="submit" title="Выйти">Выйти</button>
                </form>
            </div>
        </aside>
        <main class="main">
            <div class="toolbar">
                <div>
                    <h1 id="resourceTitle">Ресурсы</h1>
                    <div class="meta" id="resourceMeta"></div>
                </div>
                <div class="toolbar-actions">
                    <button class="secondary toolbar-back" id="dashboardBtn" type="button" style="display:none;">Панель</button>
                    <button class="secondary" id="backupBtn" style="display:none;">Сделать бэкап</button>
                    <button class="secondary" id="restoreBtn" style="display:none;">Восстановить</button>
                    <input type="file" id="restoreFile" accept=".json" style="display:none;">
                    <input type="password" id="restoreKeyInput" placeholder="Ключ восстановления" style="display:none;">
                    <button class="theme-toggle" id="themeToggle" type="button"></button>
                    <button class="secondary" id="refreshBtn">Обновить</button>
                    <button class="primary" id="createBtn">Создать</button>
                </div>
            </div>

            <div class="notice" id="notice" style="display:none;"></div>

            <section class="dashboard-view" id="dashboardView" style="display:none;"></section>

            <div class="filters">
                <input id="searchInput" placeholder="Поиск">
                <input id="orderingInput" placeholder="Сортировка (например, -created_at)">
                <input id="pageSizeInput" type="number" min="1" max="200" value="20">
                <div style="display:flex; gap:8px;">
                    <button class="primary" id="applyFilters">Применить</button>
                    <button class="secondary" id="resetFilters">Сбросить</button>
                </div>
            </div>

            <div class="filter-rows" id="filterRows"></div>
            <button class="secondary" id="addFilterRow">Добавить фильтр</button>

            <div class="table-card" id="tableCard" style="margin-top:16px;">
                <div class="table-wrapper">
                    <table id="dataTable"></table>
                </div>
                <div class="pagination">
                    <button class="secondary" id="prevPage">Назад</button>
                    <div id="paginationText"></div>
                    <button class="secondary" id="nextPage">Вперёд</button>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="formModal">
        <div class="modal-card">
            <h2 id="modalTitle">Редактирование</h2>
            <div id="modalBody" style="margin-top:14px;"></div>
            <div class="form-actions">
                <button class="secondary" id="modalCancel">Отмена</button>
                <button class="primary" id="modalSave">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        window.__TOKENS__ = {
            access: "{{ access_token }}",
            refresh: "{{ refresh_token }}",
        };
    </script>
    <script>
        (function () {
            const root = document.documentElement;
            const btn = document.getElementById('themeToggle');
            if (!btn) return;
            function applyTheme(theme) {
                root.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                btn.innerHTML = `<span class="dot"></span><span class="label">${theme === 'light' ? 'Светлая' : 'Темная'}</span>`;
                btn.title = 'Сменить тему';
            }
            const current = localStorage.getItem('theme') || 'light';
            applyTheme(current);
            btn.addEventListener('click', () => {
                const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                applyTheme(next);
            });
        })();
    </script>
    <script src="{% static 'admin_panel/admin_panel.js' %}?v=9"></script>
</body>
</html>
