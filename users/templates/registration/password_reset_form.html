<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Восстановление пароля</title>
    <script>
        (function () {
            const stored = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', stored);
        })();
    </script>
    <style>
        @font-face {
            font-family: "AppFont";
            src: url("/static/fonts/DejaVuSans.ttf") format("truetype");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: "AppFont";
            src: url("/static/fonts/DejaVuSans-Bold.ttf") format("truetype");
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
        :root {
            --font: "AppFont", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
            --bg:
                radial-gradient(1200px 720px at 20% 0%, rgba(157, 255, 43, 0.10), transparent 60%),
                radial-gradient(900px 520px at 92% 18%, rgba(255, 255, 255, 0.06), transparent 62%),
                linear-gradient(165deg, #07090d, #0b1016 55%, #0a0f14);
            --text: rgba(241, 245, 255, 0.94);
            --muted: rgba(215, 222, 240, 0.62);
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.10);
            --input-bg: rgba(255, 255, 255, 0.08);
            --input-text: rgba(241, 245, 255, 0.92);
            --input-border: rgba(255, 255, 255, 0.12);
            --btn-bg: linear-gradient(135deg, #c7ff66, #9dff2b);
            --btn-text: #15171c;
            --link: rgba(241, 245, 255, 0.92);
            --danger-bg: rgba(255, 59, 59, 0.16);
            --danger-text: rgba(255, 220, 220, 0.95);
            --shadow-card:
                0 22px 70px rgba(0, 0, 0, 0.55),
                0 1px 0 rgba(255, 255, 255, 0.06) inset;
        }
        :root[data-theme="light"] {
            --bg:
                radial-gradient(1200px 720px at 18% 0%, rgba(255, 255, 255, 0.92), transparent 62%),
                radial-gradient(900px 520px at 92% 18%, rgba(255, 255, 255, 0.75), transparent 60%),
                linear-gradient(165deg, #f1f2f6, #e9ebf1 55%, #e3e6ee);
            --text: #15171c;
            --muted: rgba(34, 39, 49, 0.68);
            --card-bg: rgba(255, 255, 255, 0.72);
            --card-border: rgba(16, 24, 40, 0.16);
            --input-bg: rgba(255, 255, 255, 0.68);
            --input-text: #15171c;
            --input-border: rgba(16, 24, 40, 0.10);
            --btn-bg: linear-gradient(135deg, #c7ff66, #9dff2b);
            --btn-text: #15171c;
            --link: #15171c;
            --danger-bg: rgba(255, 59, 59, 0.12);
            --danger-text: #a61b1b;
            --shadow-card: 0 22px 70px rgba(16, 24, 40, 0.12);
        }
        * { box-sizing: border-box; font-family: var(--font); }
        body {
            margin: 0;
            height: 100vh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 24px;
        }
        .card {
            width: min(440px, 92vw);
            padding: 34px;
            border-radius: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--card-border);
        }
        h2 { margin: 0 0 10px; font-weight: 600; }
        p { margin: 0 0 14px; color: var(--muted); font-size: 13px; line-height: 1.45; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0 14px;
            border-radius: 12px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--input-text);
            font-size: 14px;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: var(--btn-bg);
            color: var(--btn-text);
            font-weight: 700;
            cursor: pointer;
        }
        .errorlist {
            margin: 0 0 10px;
            padding: 10px 12px;
            border-radius: 10px;
            background: var(--danger-bg);
            color: var(--danger-text);
            list-style: none;
            font-size: 13px;
        }
        a { color: var(--link); text-decoration: none; }
        .footer { margin-top: 14px; font-size: 13px; }
        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 32px;
            padding: 0 12px;
            border-radius: 999px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            width: auto;
        }
        .theme-toggle .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--btn-bg);
        }
    </style>
</head>
<body>
<button type="button" class="theme-toggle" id="themeToggle">Тема</button>
<div class="card">
    <h2>Восстановление пароля</h2>
    <p>Введите корпоративную почту. Если пользователь существует и активен, мы отправим ссылку для сброса пароля.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.email }}
        {% if form.email.errors %}{{ form.email.errors }}{% endif %}
        <button type="submit">Отправить ссылку</button>
    </form>
    <div class="footer">
        <a href="{% url 'login' %}">Вернуться ко входу</a>
    </div>
</div>
<script>
    (function () {
        const root = document.documentElement;
        const btn = document.getElementById('themeToggle');
        if (!btn) return;
        function applyTheme(theme) {
            root.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            btn.innerHTML = `<span class="dot"></span><span class="label">${theme === 'light' ? 'Светлая' : 'Темная'}</span>`;
            btn.title = 'Сменить тему';
        }
        const current = localStorage.getItem('theme') || 'dark';
        applyTheme(current);
        btn.addEventListener('click', () => {
            const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            applyTheme(next);
        });
    })();
</script>
</body>
</html>
