{% extends "admin/base_site.html" %}
{% load i18n static %}

{% block extrastyle %}
  {{ block.super }}
  <style>
    body.login {
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(157, 255, 43, 0.10), transparent 60%),
        radial-gradient(1000px 500px at 80% 10%, rgba(255, 255, 255, 0.06), transparent 60%),
        radial-gradient(900px 500px at 50% 100%, rgba(255, 255, 255, 0.05), transparent 60%),
        linear-gradient(160deg, #07090d, #0b1016 55%, #0a0f14);
      min-height: 100vh;
    }
    .login #container {
      background: transparent;
      box-shadow: none;
    }
    .login #content {
      width: min(420px, 92vw);
      margin: 6vh auto 0;
      padding: 36px;
      border-radius: 20px;
      background: var(--glass);
      backdrop-filter: blur(16px);
      box-shadow:
        0 16px 40px rgba(6, 10, 28, 0.5),
        0 0 30px rgba(157, 255, 43, 0.12);
      color: var(--text);
      border: 1px solid var(--stroke);
    }
    .login #content h1 {
      color: var(--text);
      font-weight: 600;
      text-align: center;
      margin-bottom: 18px;
    }
    .login .form-row label {
      color: var(--text-soft);
      font-size: 12px;
    }
    .login .form-row input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: var(--glass-strong);
      color: var(--text);
      outline: none;
    }
    .login .submit-row input[type="submit"] {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: var(--accent-grad);
      color: #15171c;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45), 0 0 18px rgba(157, 255, 43, 0.12);
    }
    .login .errornote {
      color: #ffdede;
      background: rgba(255, 80, 120, 0.2);
      border-radius: 10px;
      padding: 10px 12px;
      border: none;
    }
  </style>
{% endblock %}

{% block content %}
  {{ block.super }}
{% endblock %}
