{% extends "admin/base_site.html" %}
{% load i18n static %}

{% block extrastyle %}
  {{ block.super }}
  <style>
    body.login {
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(93, 116, 255, 0.3), transparent 60%),
        radial-gradient(1000px 500px at 80% 10%, rgba(120, 150, 255, 0.22), transparent 60%),
        radial-gradient(900px 500px at 50% 100%, rgba(90, 120, 255, 0.2), transparent 60%),
        linear-gradient(160deg, #0b0f2d, #0f1c3d 55%, #131c52);
      min-height: 100vh;
    }
    .login #container {
      background: transparent;
      box-shadow: none;
    }
    .login #content {
      width: min(420px, 92vw);
      margin: 6vh auto 0;
      padding: 36px;
      border-radius: 20px;
      background: rgba(20, 30, 70, 0.45);
      backdrop-filter: blur(16px);
      box-shadow:
        0 16px 40px rgba(6, 10, 28, 0.5),
        0 0 30px rgba(80, 110, 255, 0.25);
      color: #fff;
    }
    .login #content h1 {
      color: #fff;
      font-weight: 600;
      text-align: center;
      margin-bottom: 18px;
    }
    .login .form-row label {
      color: #cbd3ff;
      font-size: 12px;
    }
    .login .form-row input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: rgba(26, 38, 92, 0.6);
      color: #fff;
      outline: none;
    }
    .login .submit-row input[type="submit"] {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #647bff, #8aa0ff);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 10px 22px rgba(88, 120, 255, 0.35);
    }
    .login .errornote {
      color: #ffdede;
      background: rgba(255, 80, 120, 0.2);
      border-radius: 10px;
      padding: 10px 12px;
      border: none;
    }
  </style>
{% endblock %}

{% block content %}
  {{ block.super }}
{% endblock %}
